<!DOCTYPE html>
<html>
<head>
    <title>Like Button</title>
</head>
<body>

<button id="likeBtn">Like 👍</button>

<script>
    var btn = document.getElementById("likeBtn");

    btn.addEventListener("click", function() {
        alert("You liked this!");
        console.log("Like button was clicked");
    });
</script>

</body>
</html>
